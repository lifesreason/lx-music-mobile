name: Build

on:
  push:
    branches:
      - master

jobs:
  Android:
    name: Android
    runs-on: ubuntu-latest
    outputs:
      signed: ${{ steps.signing.outputs.available }}
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Setup Env
        uses: ./.github/actions/setup

      - name: Check signing secrets
        id: signing
        env:
          KEYSTORE_STORE_FILE_BASE64: ${{ secrets.KEYSTORE_STORE_FILE_BASE64 }}
          KEYSTORE_STORE_FILE: ${{ secrets.KEYSTORE_STORE_FILE }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        shell: bash
        run: |
          if [[ -n "$KEYSTORE_STORE_FILE_BASE64" && -n "$KEYSTORE_STORE_FILE" && -n "$KEYSTORE_KEY_ALIAS" && -n "$KEYSTORE_PASSWORD" && -n "$KEYSTORE_KEY_PASSWORD" ]]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets are not configured; building debug APK artifacts."
          fi

      - name: Build Release Packages
        if: steps.signing.outputs.available == 'true'
        env:
          DISABLE_SVG: 1
          KEYSTORE_STORE_FILE_BASE64: ${{ secrets.KEYSTORE_STORE_FILE_BASE64 }}
          KEYSTORE_STORE_FILE: ${{ secrets.KEYSTORE_STORE_FILE }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        shell: bash
        run: |
          cd android
          printf '%s' "$KEYSTORE_STORE_FILE_BASE64" | base64 --decode > "app/$KEYSTORE_STORE_FILE"
          trap 'rm -f "app/$KEYSTORE_STORE_FILE"' EXIT
          ./gradlew assembleRelease -PMYAPP_UPLOAD_STORE_FILE="$KEYSTORE_STORE_FILE" -PMYAPP_UPLOAD_KEY_ALIAS="$KEYSTORE_KEY_ALIAS" -PMYAPP_UPLOAD_STORE_PASSWORD="$KEYSTORE_PASSWORD" -PMYAPP_UPLOAD_KEY_PASSWORD="$KEYSTORE_KEY_PASSWORD"

      - name: Build Debug Packages
        if: steps.signing.outputs.available != 'true'
        env:
          DISABLE_SVG: 1
        shell: bash
        run: |
          cd android
          ./gradlew assembleDebug

      # Push tag to GitHub if package.json version's tag is not tagged
      - name: Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

      - name: Create git tag
        if: steps.signing.outputs.available == 'true'
        uses: pkgdeps/git-tag-action@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_repo: ${{ github.repository }}
          version: ${{ env.PACKAGE_VERSION }}
          git_commit_sha: ${{ github.sha }}
          git_tag_prefix: "v"

      - name: Generate release file MD5
        if: steps.signing.outputs.available == 'true'
        run: |
          cd android/app/build/outputs/apk/release
          md5sum *.apk

      - name: Upload Artifact
        if: steps.signing.outputs.available == 'true'
        uses: ./.github/actions/upload-artifact
        env:
          PACKAGE_VERSION: ${{ env.PACKAGE_VERSION }}

      - name: Generate debug file MD5
        if: steps.signing.outputs.available != 'true'
        run: |
          cd android/app/build/outputs/apk/debug
          md5sum *.apk

      - name: Upload Debug Artifacts
        if: steps.signing.outputs.available != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: app-v${{ env.PACKAGE_VERSION }}-debug
          path: android/app/build/outputs/apk/debug/*.apk

